<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | CAREER INTELLIGENCE NEXUS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg-dark: #030712;
            --card-bg: rgba(17, 24, 39, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f9fafb;
            --text-dim: #9ca3af;
            --error: #ef4444;
            --success: #10b981;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 3.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 0.5rem;
            display: block;
        }

        h1 { 
            font-family: 'Outfit', sans-serif; 
            font-size: 2.25rem; 
            margin-bottom: 2rem; 
            text-align: center; 
            letter-spacing: -1px;
        }

        .input-group { margin-bottom: 1.5rem; }

        label { 
            color: var(--text-dim); 
            font-size: 0.85rem; 
            font-weight: 500; 
            margin-bottom: 0.5rem; 
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            padding: 1.1rem;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus { 
            outline: none; 
            border-color: var(--primary); 
            background: rgba(99, 102, 241, 0.05);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn-auth {
            width: 100%;
            padding: 1.1rem;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: 0.3s;
            font-size: 1rem;
            box-shadow: 0 10px 15px -3px var(--primary-glow);
        }

        .btn-auth:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 15px 25px -5px var(--primary-glow);
            filter: brightness(1.1);
        }

        .toggle-text { 
            text-align: center; 
            margin-top: 2rem; 
            color: var(--text-dim); 
            font-size: 0.95rem; 
        }
        
        .toggle-text a { 
            color: var(--primary); 
            text-decoration: none; 
            font-weight: 600; 
            transition: 0.3s;
        }
        .toggle-text a:hover { color: white; }

        #errorMessage { 
            color: var(--error); 
            margin-top: 1.5rem; 
            text-align: center; 
            display: none; 
            font-size: 0.9rem;
            padding: 0.75rem;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

    </style>
</head>
<body>
    <div class="login-card">
        <span class="logo-text">CAREER INTELLIGENCE NEXUS</span>
        <h1 id="title">Welcome Back</h1>
        <form id="authForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="name@example.com">
            </div>
            <div class="input-group">
                <label>Access Key</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-auth" id="submitBtn">Sign In</button>
            <p id="errorMessage"></p>
        </form>
        <p class="toggle-text" id="toggleText">
            New here? <a href="#" id="toggleLink">Create an Intelligence Profile</a>
        </p>
    </div>

    <script>
        let isLogin = true;
        const form = document.getElementById('authForm');
        const title = document.getElementById('title');
        const submitBtn = document.getElementById('submitBtn');
        const toggleText = document.getElementById('toggleText');
        const errorMsg = document.getElementById('errorMessage');

        function setupToggle() {
            const toggleLink = document.getElementById('toggleLink');
            toggleLink.onclick = (e) => {
                e.preventDefault();
                isLogin = !isLogin;
                title.innerText = isLogin ? 'Welcome Back' : 'Create Account';
                submitBtn.innerText = isLogin ? 'Sign In' : 'Begin Analysis';
                toggleText.innerHTML = isLogin ? 
                    `New here? <a href="#" id="toggleLink">Create an Intelligence Profile</a>` : 
                    `Already joined? <a href="#" id="toggleLink">Sign in to your account</a>`;
                setupToggle();
            };
        }
        setupToggle();

        form.onsubmit = async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            errorMsg.style.background = 'rgba(239, 68, 68, 0.1)';
            errorMsg.style.color = 'var(--error)';
            
            const endpoint = isLogin ? '/api/login' : '/api/signup';
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                const result = await response.json();
                if (response.ok) {
                    if (isLogin && result.token) {
                        localStorage.setItem('career_pro_token', result.token);
                        window.location.href = '/dashboard';
                    } else {
                        errorMsg.style.background = "rgba(16, 185, 129, 0.1)";
                        errorMsg.style.color = "var(--success)";
                        errorMsg.innerText = "Account ready! You can now sign in.";
                        errorMsg.style.display = 'block';
                        if (!isLogin) document.getElementById('toggleLink').click();
                    }
                } else {
                    errorMsg.innerText = result.detail || 'Authentication sequence failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = "Network intelligence error. Please try again.";
                errorMsg.style.display = 'block';
            }
        };
    </script>
</body>
</html>
